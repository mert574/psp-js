name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web
      # Build the docs and place them under /psp-js/docs/ alongside the app. The
      # docs base is set to /psp-js/docs/ when GITHUB_ACTIONS is set (see
      # docs/.vitepress/config.ts), matching this path.
      - run: npm run docs:build
      - run: cp -r docs/.vitepress/dist dist-web/docs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
